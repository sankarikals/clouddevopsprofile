name: Provision infra and deploy static site

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform and deploy?"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  infra-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init

      - name: Terraform Plan
        run: |
          terraform -chdir=infra/terraform plan -input=false -out=tfplan \
            -var "s3_bucket_name=${{ secrets.S3_BUCKET }}" \
            -var "domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var "hosted_zone_id=${{ secrets.HOSTED_ZONE_ID }}" \
            -var "acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN }}"

      - name: Terraform Apply
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        run: terraform -chdir=infra/terraform apply -input=false -auto-approve tfplan

      - name: Export outputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        id: tfout
        run: |
          echo "CF_DOMAIN=$(terraform -chdir=infra/terraform output -raw cloudfront_domain)" >> $GITHUB_OUTPUT
          echo "CF_ID=$(terraform -chdir=infra/terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Sync to S3 (static assets long-cache, index no-cache)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        run: |
          aws s3 sync dist s3://${{ secrets.S3_BUCKET }} --delete --cache-control "public,max-age=31536000" --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html --cache-control "no-cache"

      - name: Invalidate CloudFront
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.tfout.outputs.CF_ID }} --paths "/*"

      - name: Print CloudFront URL
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply == true }}
        run: echo "Site available at https://${{ steps.tfout.outputs.CF_DOMAIN }}"
