name: Destroy infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'DESTROY' to confirm infra destroy"
        required: true
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Fail if not confirmed
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Destroy confirmation required (type DESTROY).";
            exit 1;
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=terraform.tfstate" -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Destroy
        run: |
          terraform -chdir=infra/terraform plan -destroy -input=false -out=tfdestroy \
            -var "s3_bucket_name=${{ secrets.S3_BUCKET }}" \
            -var "domain_name=${{ secrets.DOMAIN_NAME || '' }}" \
            -var "hosted_zone_id=${{ secrets.HOSTED_ZONE_ID || '' }}" \
            -var "acm_certificate_arn=${{ secrets.ACM_CERTIFICATE_ARN || '' }}"
          terraform -chdir=infra/terraform apply -input=false -auto-approve tfdestroy

      - name: Optional: Remove website objects from S3
        if: ${{ always() }}
        run: |
          aws s3 rm s3://${{ secrets.S3_BUCKET }} --recursive || true

      - name: Cleanup local files
        run: rm -f infra/terraform/tfplan infra/terraform/tfdestroy
